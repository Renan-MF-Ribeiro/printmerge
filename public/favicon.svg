<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#1a202c"/>

  <!-- Notebook spine -->
  <rect x="7" y="5" width="5" height="22" rx="2" fill="#3182ce"/>

  <!-- Notebook pages -->
  <rect x="11" y="5" width="14" height="22" rx="2" fill="#e8f0f8"/>

  <!-- Page ruled lines -->
  <line x1="14" y1="10.5" x2="22" y2="10.5" stroke="#90aec8" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="14" y1="14"   x2="22" y2="14"   stroke="#90aec8" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="14" y1="17.5" x2="22" y2="17.5" stroke="#90aec8" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="14" y1="21"   x2="19" y2="21"   stroke="#90aec8" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Merge dot accent on first line -->
  <circle cx="22.5" cy="10.5" r="1.5" fill="#3182ce"/>

  <!-- Spine rings -->
  <circle cx="9.5" cy="10" r="1.4" fill="#1a202c" opacity="0.5"/>
  <circle cx="9.5" cy="16" r="1.4" fill="#1a202c" opacity="0.5"/>
  <circle cx="9.5" cy="22" r="1.4" fill="#1a202c" opacity="0.5"/>
</svg>
